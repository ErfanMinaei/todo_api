enum Role {
  USER
  ADMIN
  SUPERADMIN
}

type User {
  id: Int!
  firstName: String!
  lastName: String
  username: String!
  roles: [Role!]!
  todoLists: [TodoList!]
}


input RegisterUserInput {
  firstName: String!
  lastName: String
  username: String!
  password: String!
}

type Query {
  allUsers: [User!]!
}

type Mutation {
  createAdmin(input: RegisterUserInput!): User!
  promoteToAdmin(userId: Int!): User!
  deleteUser(userId: Int!): Boolean!
}